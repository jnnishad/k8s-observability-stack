name: Lint

on:
  pull_request:
  push:
    branches: [main]

jobs:
  yamllint:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - name: Install yamllint
        run: pip install yamllint
      - name: Lint YAML
        run: |
          yamllint -d "{extends: default, rules: {line-length: {max: 200}}}" helm/ alerts/ dashboards/

  helm-lint:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: azure/setup-helm@v4
      - name: helm lint values files (dry-run against public charts)
        run: |
          helm repo add prometheus-community https://prometheus-community.github.io/helm-charts
          helm repo add grafana https://grafana.github.io/helm-charts
          helm repo update
          helm template kube-prom prometheus-community/kube-prometheus-stack -f helm/values-prometheus.yaml > /dev/null
          helm template grafana grafana/grafana -f helm/values-grafana.yaml > /dev/null
          helm template mimir grafana/mimir-distributed -f helm/values-mimir.yaml > /dev/null
          helm template loki grafana/loki -f helm/values-loki.yaml > /dev/null
          helm template alloy grafana/alloy -f helm/values-alloy.yaml > /dev/null
