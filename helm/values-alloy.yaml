# Grafana Alloy — unified telemetry collector (metrics, logs, traces)
# deployed as a DaemonSet so every node ships its own logs/metrics.
# helm repo add grafana https://grafana.github.io/helm-charts
# helm install alloy grafana/alloy -f helm/values-alloy.yaml -n monitoring

alloy:
  configMap:
    content: |
      discovery.kubernetes "pods" {
        role = "pod"
      }

      loki.source.kubernetes "pods" {
        targets    = discovery.kubernetes.pods.targets
        forward_to = [loki.write.default.receiver]
      }

      loki.write "default" {
        endpoint {
          url = "http://loki-write.monitoring.svc.cluster.local:3100/loki/api/v1/push"
        }
      }

      prometheus.scrape "node" {
        targets    = discovery.kubernetes.pods.targets
        forward_to = [prometheus.remote_write.mimir.receiver]
      }

      prometheus.remote_write "mimir" {
        endpoint {
          url = "http://mimir-nginx.monitoring.svc.cluster.local/api/v1/push"
        }
      }

controller:
  type: daemonset

resources:
  requests: { cpu: 100m, memory: 128Mi }
  limits: { cpu: 500m, memory: 512Mi }
