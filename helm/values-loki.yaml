---
# Loki — log aggregation, fed by Alloy agents cluster-wide
# helm repo add grafana https://grafana.github.io/helm-charts
# helm install loki grafana/loki -f helm/values-loki.yaml -n monitoring

loki:
  auth_enabled: false
  commonConfig:
    replication_factor: 3
  storage:
    type: s3
    bucketNames:
      chunks: REPLACE_WITH_YOUR_LOKI_CHUNKS_BUCKET
      ruler: REPLACE_WITH_YOUR_LOKI_RULER_BUCKET
    s3:
      region: eu-central-1
  limits_config:
    retention_period: 720h

write:
  replicas: 3
read:
  replicas: 2
backend:
  replicas: 3
